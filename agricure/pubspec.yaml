name: agricure
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # --- 1. Core & State Management ---
  get: ^4.6.6
  shared_preferences: ^2.2.3

  # --- 2. Firebase & Auth (Login, Marketplace, Logout) ---
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  google_sign_in: ^6.2.1
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9

  # --- 3. Weather & Scheduler ---
  http: ^1.2.1
  geolocator: ^11.0.1
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2

  # --- 4. Scanner (Camera & Gallery) ---
  camera: ^0.10.5+9
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  
  

  # --- 5. AI Chatbot (Gemini) ---
  google_generative_ai: ^0.4.3

  # --- 6. UI Helpers & Utilities ---
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  intl: ^0.19.0

flutter:
  uses-material-design: true
